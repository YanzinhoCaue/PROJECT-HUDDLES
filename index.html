<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/css/reset.css">
    <link rel="stylesheet" href="./src/css/style.css">
    <link rel="stylesheet" href="./src/css/responsive.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="./src/images/favicon-32x32.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Huddle | Futuristic Community</title>
</head>
<body>
    <main>
        <span class="fx fx-grid" aria-hidden="true"></span>
        <span class="fx fx-glow" aria-hidden="true"></span>
        <header class="logo">
            <a href="#" aria-label="Huddle homepage"><img src="./src/images/logo.svg" alt="Huddle logo"></a>
        </header>
        <section class="information">
            <div class="illustration">
                <img src="./src/images/illustration-mockups.svg" alt="Mockup screens from the Huddle platform">
            </div>
            <div class="text-and-register">
                <div class="copy">
                    <p class="eyebrow">Future-ready platform</p>
                    <h1 class="title">
                        Build The Community<br>
                        Your Fans Will Love
                    </h1>
                    <p class="description">
                        Huddle re-imagines the way we build communities. You have a voice, and so does your audience. Create connections with your users as you engage in genuine discussion.
                    </p>
                </div>
                <div class="register">
                    <a href="#">Register now</a>
                </div>
            </div>
        </section>
        <footer class="social">
            <a href="#" class="facebook" aria-label="Follow us on Facebook"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#" class="twitter" aria-label="Follow us on X"><i class="fa-brands fa-twitter"></i></a>
            <a href="#" class="instagram" aria-label="Follow us on Instagram"><i class="fa-brands fa-instagram"></i></a>
        </footer>
    </main>
</body>
</html>
